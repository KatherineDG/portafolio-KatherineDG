<div class="container-experience-card">
    <div class="header-experience-card">
        <div class="part-header-experience-card">
            <h1 class="title-primary">{{rol()}}</h1>
            <h2 class="title-secondary">{{site()}}</h2>
        </div>
        <p class="title-thirdly">{{duration()}}</p>
    </div>
    <div class="container-activities">
        @for (activity of activities(); track activity) {
            <div class="container-activity">
                <div class="vignette-activity"></div>
                <p class="activity">{{activity}}</p>
            </div>
        }
    </div>
</div>
