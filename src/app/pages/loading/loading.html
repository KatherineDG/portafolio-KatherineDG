<body>
    <main class="loading">
        <div class="container-loading-star">
            @for (num of [0, 1, 2, 3, 4]; track num) {
                <img [src]="timeOfLoading >= num ? '/star-pink.svg' : '/star-vector.svg'" [class]="timeOfLoading >= num ? 'star-active' : 'star-deactive'" [height]="25">
            }
        </div>
            
        <div class="line-empty">
            <div class="line-fill"></div>
        </div>
        <p class="text-loading">Preparando el salto al portafolio de Katherine...</p>
    </main>
</body>
