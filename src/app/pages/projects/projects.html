<main class="main-projects">
    <h1 class="title-projects">Proyectos</h1>
    <div class="container-project-cards">
        @for (project of projects; track project.name) {
            <app-project-card [image]="project.image" [role]="project.role" [type]="project.type", [year]="project.year" [description]="project.description"></app-project-card>
        }
    </div>
</main>
