<main class="main-projects">
    <h1 class="title-projects">{{ name() }}</h1>
    @if ( currentProject(); as project ) {
        <div class="container-project">
            <div class="container-information-project">
                <div class="container-images-project">
                    <button class="btn-before">
                        <img src="icons/icons8-back-96.png" width="24">
                    </button>
                    <img src="images/{{project.images[0]}}.jpg" width="500">
                    <button class="btn-after">
                        <img src="icons/icons8-next-96.png" width="24">
                    </button>
                </div>
                <div class="container-technologies-project">
                    @for (technology of project.technologies; track technology) {
                        <p class="technology-project">{{ technology }}</p>
                    }
                </div>
                <p class="text-project">{{ project.information }}</p>
            </div>
            <div>   
                cards
                <!--Cards de links externos-->
            </div>
        </div>
    }
   
</main>
